services:
  postgres:
    image: postgres:16-alpine
    container_name: fishing-journal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fishing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishing}
      POSTGRES_DB: ${POSTGRES_DB:-fishing_journal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-fishing} -d ${POSTGRES_DB:-fishing_journal}
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
